name: juna
description: Plateforme d'abonnement repas pour l'Afrique de l'Ouest.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP Client
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Local DB / Cache
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Environment
  flutter_dotenv: ^5.1.0

  # Animations
  lottie: ^3.1.2

  # Images réseau
  cached_network_image: ^3.3.1

  # Formulaires
  reactive_forms: ^17.0.1

  # Dates
  intl: ^0.19.0

  # Connectivité
  connectivity_plus: ^6.0.3

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Google Fonts
  google_fonts: ^6.2.1

  # Utils
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - .env

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
